networks:
  laravel:
    driver: bridge

services:
  # Веб-сервер Nginx
  webserver:
    image: nginx:alpine
    container_name: laravel_webserver
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - laravel

  # PHP-FPM приложение
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - laravel
    environment:
      # Подключение к внешней Neon БД (не внутри Docker)
      DB_CONNECTION: pgsql
      DB_HOST: ep-young-salad-ape85qdu-pooler.c-7.us-east-1.aws.neon.tech
      DB_PORT: 5432
      DB_DATABASE: neondb
      DB_USERNAME: neondb_owner
      DB_PASSWORD: npg_yo8upLrFM9Xa
      DB_SSLMODE: require
      # Другие переменные Laravel
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      LOG_CHANNEL: stack
      # ... остальные по необходимости