networks:
  laravel:
    driver: bridge

services:
  webserver:
    image: nginx:alpine
    container_name: laravel_webserver
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - laravel

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    working_dir: /var/www/html

    volumes:
      - .:/var/www/html

    networks:
      - laravel

    environment:
      DB_CONNECTION: pgsql
      DB_HOST: ep-young-salad-ape85qdu-pooler.c-7.us-east-1.aws.neon.tech
      DB_PORT: 5432
      DB_DATABASE: neondb
      DB_USERNAME: neondb_owner
      DB_PASSWORD: npg_yo8upLrFM9Xa
      DB_SSLMODE: require

      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost

      LOG_CHANNEL: stack